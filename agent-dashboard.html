<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Dashboard – Britam</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

    :root {
      --bg:      #f3f4f6;
      --white:   #ffffff;
      --faint:   #f8fafc;
      --dark:    #1f2937;
      --body:    #1e293b;
      --muted:   #64748b;
      --slate:   #334155;
      --border:  #e2e8f0;
      --bstrong: #cbd5e1;
      --accent:  #059668;
      --red:     #ba0c2f;
    }

    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--body); min-height:100vh; font-size:13px; }
    .site-ai-wrap {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 1200;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .site-ai-pill {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      max-width: 220px;
      padding: 11px 16px;
      border-radius: 14px;
      border: 1px solid rgba(227,0,15,0.18);
      background: #fff;
      color: #111827;
      box-shadow: 0 12px 28px rgba(15,23,42,0.10);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.35;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }
    .site-ai-pill:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 32px rgba(15,23,42,0.14);
      border-color: rgba(227,0,15,0.28);
    }
    .site-ai-pill::after {
      content: "";
      position: absolute;
      right: -7px;
      top: 50%;
      width: 12px;
      height: 12px;
      background: #fff;
      border-top: 1px solid rgba(227,0,15,0.18);
      border-right: 1px solid rgba(227,0,15,0.18);
      transform: translateY(-50%) rotate(45deg);
    }
    .site-ai-dot {
      width: 8px;
      height: 8px;
      border-radius: 9999px;
      background: #e3000f;
      flex-shrink: 0;
      box-shadow: 0 0 0 4px rgba(227,0,15,0.10);
    }
    .site-ai-hidden { display: none !important; }
    .site-ai-drawer {
      position: fixed;
      right: 24px;
      bottom: 96px;
      width: 380px;
      max-width: calc(100vw - 32px);
      height: 560px;
      max-height: calc(100vh - 120px);
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 24px 56px rgba(15,23,42,0.18);
      border: 1px solid #e5e7eb;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .site-ai-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      border-bottom: 1px solid #e5e7eb;
      background: linear-gradient(90deg,#0078bf,#005c92);
    }
    .site-ai-brand { display: flex; align-items: center; gap: 12px; }
    .site-ai-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: #fff;
    }
    .site-ai-title { font-size: 17px; font-weight: 700; color: #fff; margin: 0; }
    .site-ai-subtitle { font-size: 12px; color: rgba(255,255,255,0.82); margin: 0; }
    .site-ai-min {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 8px;
      background: rgba(255,255,255,0.12);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .site-ai-messages {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
      background: #f9fafb;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .site-ai-composer { padding: 14px 14px 12px; border-top: 1px solid #e5e7eb; background: #fff; }
    .site-ai-row { display: flex; gap: 8px; }
    .site-ai-input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 9999px;
      border: 1px solid #d1d5db;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
    }
    .site-ai-input:focus { border-color: #0078bf; box-shadow: 0 0 0 2px rgba(0,120,191,0.18); }
    .site-ai-send {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: #e3000f;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      flex-shrink: 0;
      transition: background .2s ease;
    }
    .site-ai-send:hover { background: #c2000d; }
    .site-ai-footnote { font-size: 10px; color: #9ca3af; text-align: center; margin: 8px 0 0; }
    .site-ai-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg,#e3000f,#c2000d);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      transition: transform .2s ease, box-shadow .2s ease;
      position: relative;
    }
    .site-ai-btn:hover { transform: scale(1.08); box-shadow: 0 8px 24px rgba(0,0,0,0.28); }
    .site-ai-pulse {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 12px;
      height: 12px;
      background: #22c55e;
      border-radius: 50%;
      border: 2px solid #fff;
    }
    .site-ai-msg { display: flex; gap: 12px; align-items: flex-start; }
    .site-ai-msg.user { flex-direction: row-reverse; }
    .site-ai-msg-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: #fff;
    }
    .site-ai-msg.bot .site-ai-msg-icon { background: linear-gradient(135deg,#e3000f,#c2000d); }
    .site-ai-msg.user .site-ai-msg-icon { background: #0078bf; }
    .site-ai-bubble { max-width: 72%; padding: 12px 16px; font-size: 13px; line-height: 1.6; }
    .site-ai-msg.bot .site-ai-bubble {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px 16px 16px 4px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      color: #111827;
    }
    .site-ai-msg.user .site-ai-bubble { background: #0078bf; border-radius: 16px 16px 4px 16px; color: #fff; }
    .site-ai-time { font-size: 10px; margin-top: 6px; }
    .site-ai-msg.bot .site-ai-time { color: #9ca3af; }
    .site-ai-msg.user .site-ai-time { color: rgba(255,255,255,0.72); }
    .site-ai-typing { display: flex; gap: 4px; }
    .site-ai-typing span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #9ca3af;
      animation: siteAiBounce 1.1s infinite ease-in-out;
    }
    .site-ai-typing span:nth-child(2) { animation-delay: .14s; }
    .site-ai-typing span:nth-child(3) { animation-delay: .28s; }
    @keyframes siteAiBounce {
      0%, 80%, 100% { transform: translateY(0); opacity: .5; }
      40% { transform: translateY(-4px); opacity: 1; }
    }
    @media (max-width: 768px) {
      .site-ai-pill { display: none; }
      .site-ai-wrap { right: 16px; bottom: 16px; }
      .site-ai-drawer { right: 16px; bottom: 88px; width: calc(100vw - 24px); max-width: calc(100vw - 24px); }
    }

    /* ── HERO ── */
    .hero-wrap { background:#fff; padding:8px 8px 0; }
    .hero { border-radius:12px; height:160px; overflow:hidden; position:relative; }
    .hero-bg-img { width:100%; height:100%; object-fit:cover; display:block; }
    .hero-logo { position:absolute; top:14px; left:20px; z-index:10; }
    .hero-logo img { height:44px; width:auto; filter:drop-shadow(0 1px 3px rgba(255,255,255,.6)); }

    /* ── LAYOUT ── */
    .page-wrap { background:var(--bg); }
    .wrap { max-width:1480px; margin:0 auto; padding:0 30px; }

    /* ── HEADING ── */
    .hrow { display:flex; align-items:center; justify-content:space-between; padding:20px 0 14px; }
    .hleft { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .hrow h1 { font-size:20px; font-weight:700; color:var(--dark); letter-spacing:-.2px; }
    .pill { font-size:10px; font-weight:700; border-radius:20px; padding:3px 10px; }
    .pill-g { background:var(--faint); border:1px solid var(--border); color:var(--muted); }
    .pill-b { background:#eff6ff; border:1px solid #bfdbfe; color:#1d4ed8; text-transform:uppercase; letter-spacing:.3px; }
    .btn-back { color:#9ca3af; display:flex; align-items:center; gap:4px; font-size:11.5px; font-weight:600; text-decoration:none; }
    .btn-back:hover { color:var(--dark); }
    .btn-logout { width:30px; height:30px; border-radius:50%; background:none; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--red); }
    .btn-logout:hover { background:rgba(186,12,47,.08); }

    /* ── WHITE PANEL ── */
    .panel { background:#fff; border-radius:8px; padding:18px 20px 24px; margin-bottom:26px; }
    .section-head {
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      margin-bottom:16px;
      flex-wrap:wrap;
    }
    .section-copy {
      display:flex;
      flex-direction:column;
      gap:4px;
    }
    .section-label {
      font-size:11px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:#0078bf;
    }
    .section-title {
      font-size:22px;
      font-weight:800;
      color:var(--dark);
      letter-spacing:-.03em;
    }
    .section-sub {
      font-size:13px;
      color:var(--muted);
      line-height:1.5;
    }
    .ops-grid {
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:12px;
      align-items:stretch;
    }
    .ops-grid > .wcard {
      display:flex;
      flex-direction:column;
      height:380px;
    }
    .ops-grid > .wcard > .wbody {
      flex:1;
      min-height:0;
      display:flex;
      flex-direction:column;
    }
    .ops-widget-foot {
      margin-top:auto;
      padding-top:12px;
      border-top:1px solid var(--border);
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .ops-summary-grid {
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:14px;
    }
    .ops-grid .fpick {
      padding:10px 12px;
      margin-bottom:14px;
      border-radius:9px;
      gap:10px;
    }
    .ops-grid .fpick-name {
      font-size:11px;
    }
    .ops-grid .efform {
      gap:12px 10px;
    }
    .ops-grid .eflbl {
      font-size:9px;
      margin-bottom:5px;
    }
    .ops-grid .efin,
    .ops-grid .efsel {
      min-height:40px;
      padding:10px 12px;
      border-radius:8px;
      font-size:12px;
    }
    .ops-grid .efbtns {
      justify-content:flex-end;
      gap:10px;
      margin-top:14px;
    }
    .ops-grid .efbtns button {
      flex:none;
      min-width:156px;
      min-height:40px;
      padding:10px 18px;
      border-radius:8px;
      font-size:11.5px;
    }
    .ops-grid .notif {
      margin-top:14px;
      padding:10px 12px;
    }
    .ops-grid .txn-list {
      gap:8px;
    }
    .ops-grid .txn-card,
    .ops-grid .erow {
      padding:10px;
      gap:10px;
    }
    .ops-grid .txn-date,
    .ops-grid .txn-amt,
    .ops-grid .eid,
    .ops-grid .eamt {
      font-size:12px;
    }
    .ops-grid .txn-meta,
    .ops-grid .txn-id-row,
    .ops-grid .emeta {
      font-size:10px;
      line-height:1.35;
      margin-top:2px;
    }
    .ops-grid .ops-widget-foot {
      gap:10px;
      padding-top:10px;
    }
    .ops-grid .txn-pagination {
      margin-top:0;
    }
    .ops-grid .pager-inline-text {
      font-size:10.5px;
    }
    .client-shell {
      display:grid;
      grid-template-columns:360px minmax(0,1fr);
      gap:16px;
      align-items:start;
    }
    .client-rail {
      border:1px solid var(--bstrong);
      border-radius:14px;
      background:#fff;
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:16px;
    }
    .client-rail-top {
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .client-label {
      font-size:11px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:var(--muted);
    }
    .client-rail-copy {
      font-size:12px;
      color:var(--muted);
      line-height:1.45;
    }
    .client-field-stack {
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .client-search-wrap {
      position:relative;
    }
    .client-input-actions {
      position:absolute;
      right:10px;
      top:50%;
      transform:translateY(-50%);
      display:flex;
      align-items:center;
      gap:4px;
    }
    .client-input-icon-btn {
      width:26px;
      height:26px;
      border:none;
      background:transparent;
      color:#94a3b8;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:8px;
      cursor:pointer;
    }
    .client-input-icon-btn:hover {
      background:#f8fafc;
      color:var(--dark);
    }
    .client-search-row {
      display:grid;
      grid-template-columns:minmax(0,1fr) auto;
      gap:8px;
      align-items:center;
    }
    .client-search {
      width:100%;
      border:1px solid var(--bstrong);
      background:#fff;
      border-radius:10px;
      padding:12px 78px 12px 38px;
      font-size:13px;
      font-weight:500;
      color:var(--dark);
      outline:none;
      font-family:'Inter',sans-serif;
    }
    .client-search:focus {
      border-color:#0078bf;
      box-shadow:0 0 0 2px rgba(0,120,191,.14);
    }
    .client-search-icon {
      position:absolute;
      left:13px;
      top:50%;
      transform:translateY(-50%);
      color:#94a3b8;
      pointer-events:none;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .client-select {
      width:100%;
      border:1px solid var(--bstrong);
      background:#fff;
      border-radius:10px;
      padding:12px 112px 12px 38px;
      font-size:13px;
      font-weight:500;
      color:var(--dark);
      outline:none;
      font-family:'Inter',sans-serif;
    }
    .client-select:focus {
      border-color:#0078bf;
      box-shadow:0 0 0 2px rgba(0,120,191,.14);
    }
    .client-combobox {
      position:relative;
    }
    .client-combo-toggle {
      width:28px;
      height:28px;
      border:none;
      background:transparent;
      color:#94a3b8;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      border-radius:8px;
    }
    .client-combo-toggle:hover {
      background:#f8fafc;
      color:var(--dark);
    }
    .client-options {
      position:absolute;
      top:calc(100% + 6px);
      left:0;
      right:0;
      background:#fff;
      border:1px solid var(--bstrong);
      border-radius:12px;
      box-shadow:0 14px 30px rgba(15,23,42,.10);
      padding:6px;
      display:flex;
      flex-direction:column;
      gap:2px;
      max-height:220px;
      overflow:auto;
      z-index:25;
    }
    .client-options[hidden] {
      display:none;
    }
    .client-option {
      width:100%;
      border:none;
      background:#fff;
      border-radius:8px;
      padding:10px 12px;
      text-align:left;
      font-size:13px;
      font-weight:500;
      color:var(--dark);
      cursor:pointer;
      font-family:'Inter',sans-serif;
    }
    .client-option:hover,
    .client-option.is-active {
      background:#f0f7ff;
      color:#0078bf;
    }
    .client-option.is-empty {
      cursor:default;
      color:var(--muted);
    }
    .client-option.is-empty:hover {
      background:#fff;
      color:var(--muted);
    }
    .client-search-btn {
      height:42px;
      padding:0 16px;
      border-radius:10px;
      border:1px solid var(--bstrong);
      background:#fff;
      color:var(--dark);
      font-size:12px;
      font-weight:700;
      cursor:pointer;
      font-family:'Inter',sans-serif;
    }
    .client-search-btn:hover {
      background:#f8fafc;
      border-color:#cbd5e1;
    }
    .client-search-note {
      min-height:17px;
      font-size:11px;
      line-height:1.4;
      color:var(--muted);
    }
    .client-mini-kpis {
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
    }
    .client-mini-card {
      border:1px solid var(--bstrong);
      border-radius:10px;
      background:#f8fafc;
      padding:12px 12px;
      display:flex;
      flex-direction:column;
      gap:4px;
      min-width:0;
    }
    .client-mini-card span:first-child {
      font-size:10px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.06em;
      color:var(--muted);
    }
    .client-mini-card strong {
      font-size:18px;
      font-weight:800;
      color:var(--dark);
      line-height:1;
    }
    .client-mini-card em {
      font-style:normal;
      font-size:11px;
      color:var(--muted);
      line-height:1.35;
    }
    .client-list { display:none !important; }
    .client-main { min-width:0; }
    .client-widget-cols {
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:12px;
      align-items:start;
    }
    .client-widget-col {
      display:flex;
      flex-direction:column;
      gap:12px;
      min-width:0;
    }
    .client-grid {
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:12px;
      align-items:start;
    }
    .client-policy-wrap {
      background: var(--faint);
      border-radius: 16px;
      padding: 14px;
      display:flex;
      flex-direction:column;
      gap:12px;
      position: sticky;
      top: 16px;
    }
    .client-policy-list {
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .client-policy-footer {
      margin-top:12px;
      padding-top:12px;
      border-top:1px solid var(--border);
    }
    .client-policy-card {
      background:#fff;
      border-radius:12px;
      border:2px solid var(--bstrong);
      padding:14px;
      cursor:pointer;
      transition:border-color .18s ease, box-shadow .18s ease;
    }
    .client-policy-card:hover { border-color:#60a5fa; }
    .client-policy-card.active {
      border-color:#3b82f6;
      box-shadow:0 4px 14px rgba(59,130,246,.18);
    }
    .client-policy-top {
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:10px;
    }
    .client-policy-id {
      font-size:14px;
      font-weight:800;
      color:var(--dark);
    }
    .client-policy-amt {
      font-size:15px;
      font-weight:800;
      color:#059668;
      white-space:nowrap;
    }
    .client-policy-bottom {
      display:flex;
      align-items:center;
      gap:8px;
    }
    .client-policy-tag {
      font-size:10px;
      font-weight:800;
      border-radius:6px;
      padding:4px 8px;
      line-height:1;
    }
    .client-policy-tag.freq {
      color:#1e40af;
      background:#dbeafe;
      text-transform:uppercase;
      letter-spacing:.04em;
    }
    .client-policy-tag.due {
      color:#92400e;
      background:#fef3c7;
    }
    .client-policy-refresh {
      margin-left:auto;
      width:30px;
      height:30px;
      border-radius:8px;
      border:none;
      background:#059668;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
    }
    .client-policy-refresh:hover { background:#047857; }
    .client-empty {
      border:1px dashed var(--border);
      border-radius:12px;
      background:#fbfdff;
      padding:28px 20px;
      text-align:center;
      color:var(--muted);
      font-size:13px;
    }
    .client-doc-copy {
      font-size:13px;
      color:var(--muted);
      line-height:1.55;
      max-width:30ch;
    }
    .agent-kpi-bar {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
      margin-bottom: 18px;

      font-size:11px;

    .benefit-expired-text { color:#ef4444; }
    .clm-row {
      display:flex;

      justify-content:space-between;

      font-size:11px;

      align-items:center;
      justify-content:center;
      cursor:pointer;

    .pg-info {
      text-align:center;
      font-size:11px;
      color:var(--muted);
      line-height:1.35;
    }
    .pg-info-main {
      font-size:12px;
      font-weight:800;
      color:var(--dark);
    }
    .pg-info-sub {
      font-size:11px;
      color:var(--muted);
      line-height:1.4;
    }
    .no-data {
      border:1px dashed var(--border);
      border-radius:10px;
      background:#fbfdff;
      padding:18px 14px;

      line-height:1.5;
    }
    .mcopy {
      font-size:12px;

      border:1px solid #edf2f7;

    .mlist-item span {
      display:block;

      line-height:1.5;
      color:var(--muted);

    .mtag-row {
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:12px;
    }
    .mtag {
      display:inline-flex;
      align-items:center;
      padding:6px 10px;
      border-radius:999px;
      background:#f8fafc;

      font-weight:700;
      color:var(--slate);

      font-family:'Inter',sans-serif;

      appearance:none;
      -webkit-appearance:none;
      transition:all .18s ease;

      border-color:var(--blue);

    /* ── COMPACT TABLE ── */
    .ctbl { width:100%; border-collapse:collapse; }
    .ctbl th {
      text-align:left; font-size:8.5px; color:var(--muted); font-weight:700;
      text-transform:uppercase; letter-spacing:.5px; padding:0 8px 7px;
      border-bottom:1.5px solid var(--border);
    }
    .ctbl td { padding:8px 8px; border-bottom:1px solid #f1f5f9; font-size:11.5px; vertical-align:middle; }
    .ctbl tbody tr:last-child td { border-bottom:none; }
    .ctbl tbody tr.clickable { cursor:pointer; }
    .ctbl tbody tr.clickable:hover td { background:#f8fafc; }
    .ctbl td.fw { font-weight:700; color:var(--dark); }
    .ctbl td.mu { color:var(--muted); font-size:10.5px; }
    .ctbl td.rt { text-align:right; }
    .ctbl td.no-wrap { white-space:nowrap; }

    /* ── BADGES ── */
    .badge { display:inline-flex; align-items:center; font-size:8.5px; font-weight:700; padding:2px 7px; border-radius:4px; white-space:nowrap; }
    .b-active  { background:#ecfdf5; color:#065f46; border:1px solid #a7f3d0; }
    .b-renewal { background:#fefce8; color:#92400e; border:1px solid #fde68a; }
    .b-expired { background:#fef2f2; color:#dc2626; border:1px solid #fecaca; }
    .b-paid    { background:#ecfdf5; color:#065f46; border:1px solid #a7f3d0; }
    .b-pending { background:#fffbeb; color:#92400e; border:1px solid #fde68a; }
    .b-settled { background:#ecfdf5; color:#065f46; border:1px solid #a7f3d0; }
    .b-review  { background:#eff6ff; color:#1d4ed8; border:1px solid #bfdbfe; }
    .b-success { background:#ecfdf5; color:#065f46; border:1px solid #a7f3d0; }
    .b-pr      { background:#fffbeb; color:#92400e; border:1px solid #fde68a; }
    .b-ok      { background:#ecfdf5; color:#065f46; border:1px solid #a7f3d0; }
    .b-no      { background:#fef2f2; color:#dc2626; border:1px solid #fecaca; }

    .pgtext { font-size:9.5px; color:var(--muted); }
    .pgtext strong { color:var(--slate); }

    /* ── COMMISSION FOOTER ── */

    /* eFRIS history rows */
    .erow {
      border:1px solid var(--border);
      border-radius:10px;
      background:#fff;
      padding:12px;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:14px;

    .eamt { font-size:13px; font-weight:800; color:var(--dark); text-align:right; margin-bottom:4px; }

    /* ── MODAL ── */
    .modal-overlay { display:none; position:fixed; inset:0; z-index:1000; background:rgba(0,0,0,.42); align-items:center; justify-content:center; }

    .modal-box { background:#fff; border-radius:12px; width:600px; max-width:95vw; max-height:88vh; overflow-y:auto; padding:28px 30px 30px; position:relative; box-shadow:0 20px 60px rgba(0,0,0,.15); }
    .mhead { display:flex; align-items:center; justify-content:space-between; margin-bottom:22px; }
    .mtitle { font-size:17px; font-weight:700; color:var(--dark); }

    .msect { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:10px; }
    .mgrid { display:grid; grid-template-columns:1fr 1fr; gap:0; border:1px solid var(--border); border-radius:8px; overflow:hidden; margin-bottom:16px; }
    .mfield { padding:10px 12px; border-bottom:1px solid var(--border); }
    .mfield:nth-child(odd) { border-right:1px solid var(--border); }
    .mfield:nth-last-child(-n+2) { border-bottom:none; }
    .mfield.full { grid-column:1/-1; border-right:none; }
    .mlbl { font-size:9.5px; font-weight:600; color:#0d9488; display:block; margin-bottom:2px; }
    .mval { font-size:12.5px; font-weight:700; color:var(--dark); }

    /* ── FOOTER ── */
    .footer-pay { background:#fff; text-align:center; padding:8px 16px; font-size:11.6px; color:#000; display:flex; align-items:center; justify-content:center; gap:6px; flex-wrap:wrap; }
    .footer-bar { background:#1a1a1a; display:flex; align-items:center; justify-content:space-between; padding:10px 48px; font-size:13.3px; color:#fff; flex-wrap:wrap; gap:8px; }
    .footer-bar a { color:#fff; text-decoration:none; }
    .footer-bar a:hover { text-decoration:underline; }
    .flinks { display:flex; align-items:center; gap:16px; }
    .fdiv { width:1px; height:14px; background:rgba(255,255,255,.4); }

    /* ── RESPONSIVE ── */
    @media (max-width:1280px) {
      .ops-grid { grid-template-columns:repeat(2, minmax(0, 1fr)); }
      .client-grid,
      .client-widget-cols { grid-template-columns:repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width:1100px) {
      .grid3 { grid-template-columns:1fr 1fr; }
      .client-shell { grid-template-columns:1fr; }
      .agent-kpi-bar { grid-template-columns:repeat(2, minmax(0, 1fr)); }
      .agent-kpi-item:nth-child(2) { border-right:none; }
      .agent-kpi-item:nth-child(-n+2) { border-bottom:1px solid var(--border); }
    }
    @media (max-width:700px)  {
      .grid3, .ops-grid, .client-grid, .client-widget-cols { grid-template-columns:1fr; }
      .wrap { padding:0 14px; }
      .efform { grid-template-columns:1fr; }
      .agent-kpi-bar { grid-template-columns:1fr; }
      .agent-kpi-item { border-right:none; border-bottom:1px solid var(--border); padding:15px 16px; }
      .agent-kpi-item:last-child { border-bottom:none; }
      .agent-kpi-val { font-size:24px; }
      .client-mini-kpis { grid-template-columns:1fr 1fr; }
    }
  </style>
</head>

let activeClient = 'ALL';
let activeClientPolicyId = null;

function getAgentClients() {
  return [...new Set(A.policies.map(p => p.client))].sort((a, b) => a.localeCompare(b));
}

function getFilteredAgentClients(value) {
  const q = String(value || '').trim().toLowerCase();
  const all = ['ALL', ...getAgentClients()];
  if (!q) return all;
  return all.filter(name => (name === 'ALL' ? 'all clients' : name).toLowerCase().includes(q));
}

function renderAgentClientMenu(value, open = true) {
  const menu = document.getElementById('agentClientMenu');
  if (!menu) return;
  const matches = getFilteredAgentClients(value);
  menu.innerHTML = matches.length
    ? matches.map(name => `
        <button
          type="button"
          class="client-option ${(activeClient === name || (activeClient === 'ALL' && name === 'ALL')) ? 'is-active' : ''}"
          onmousedown="event.preventDefault()"
          onclick='selectAgentClientOption(${JSON.stringify(name)})'>
          ${name === 'ALL' ? 'All clients' : name}
        </button>`).join('')
    : `<div class="client-option is-empty">No clients found</div>`;
  menu.hidden = !open;
}

function openAgentClientMenu() {
  const input = document.getElementById('agentClientSelect');
  renderAgentClientMenu(input ? input.value : '', true);
}

function closeAgentClientMenu() {
  window.setTimeout(() => {
    const menu = document.getElementById('agentClientMenu');
    if (menu) menu.hidden = true;
    const input = document.getElementById('agentClientSelect');
    if (input) handleClientLookup(input.value);
  }, 120);
}

function toggleAgentClientMenu() {
  const menu = document.getElementById('agentClientMenu');
  const input = document.getElementById('agentClientSelect');
  if (!menu || !input) return;
  if (menu.hidden) {
    input.focus();
    renderAgentClientMenu(input.value, true);
  } else {
    menu.hidden = true;
  }
}

function clearAgentClientInput() {
  const input = document.getElementById('agentClientSelect');
  if (!input) return;
  input.value = '';
  setActiveClient('ALL');
  renderAgentClientMenu('', true);
  input.focus();
}

function handleAgentClientInput(value) {
  renderAgentClientMenu(value, true);
}

function handleAgentClientKeydown(event) {
  if (event.key === 'Enter') {
    event.preventDefault();
    const matches = getFilteredAgentClients(event.target.value);
    if (matches.length) selectAgentClientOption(matches[0]);
  }
  if (event.key === 'Escape') {
    const menu = document.getElementById('agentClientMenu');
    if (menu) menu.hidden = true;
  }
}

function selectAgentClientOption(name) {
  const input = document.getElementById('agentClientSelect');
  if (input) input.value = name === 'ALL' ? '' : name;
  const menu = document.getElementById('agentClientMenu');
  if (menu) menu.hidden = true;
  setActiveClient(name);
}

function handleClientLookup(value) {
  const clients = getAgentClients();
  const query = String(value || '').trim().toLowerCase();
  if (!query || query === 'all clients') {
    setActiveClient('ALL');
    return;
  }
  const exactMatch = clients.find(name => name.toLowerCase() === query);
  if (exactMatch) setActiveClient(exactMatch);
}

function handleAgentPolicySearchInput() {
  const note = document.getElementById('agentPolicySearchNote');
  if (note) {
    note.textContent = '';
    note.style.color = 'var(--muted)';
  }
}

function clearAgentPolicySearch() {
  const input = document.getElementById('agentPolicySearch');
  const note = document.getElementById('agentPolicySearchNote');
  if (input) input.value = '';
  if (note) {
    note.textContent = '';
    note.style.color = 'var(--muted)';
  }
  if (input) input.focus();
}

function searchAgentPolicy() {
  const input = document.getElementById('agentPolicySearch');
  const note = document.getElementById('agentPolicySearchNote');
  const query = String(input?.value || '').trim().toLowerCase();
  if (!query) {
    if (note) note.textContent = '';
    return;
  }

  const matches = A.policies.filter(policy => policy.id.toLowerCase().includes(query));
  const exact = matches.find(policy => policy.id.toLowerCase() === query);

  if (exact || matches.length === 1) {
    const match = exact || matches[0];
    activeClient = match.client;
    activeClientPolicyId = match.id;
    const clientPolicies = getClientSnapshot(activeClient).policies;
    const policyIndex = clientPolicies.findIndex(policy => policy.id === match.id);
    pg.cpol = policyIndex >= 0 ? Math.floor(policyIndex / PS.cpol) : 0;
    pg.pol = 0;
    pg.cl = 0;
    pg.pm = 0;
    renderAgentWorkspaceV2();
    return;
  }

  if (!note) return;
  if (!matches.length) {
    note.style.color = '#dc2626';
    note.textContent = 'No policy found. Check the number and try again.';
    return;
  }
  note.style.color = 'var(--muted)';
  note.textContent = `${matches.length} matches found. Type the full policy number to jump straight to one.`;
}

function getScopedItems(k) {
  const source = k==='pol' ? A.policies : k==='cl' ? A.claims : A.payments;
  return activeClient === 'ALL' ? source : source.filter(item => item.client === activeClient);
}

function getClientSnapshot(name) {
  const policies = name === 'ALL' ? A.policies : A.policies.filter(p => p.client === name);
  const claims = name === 'ALL' ? A.claims : A.claims.filter(c => c.client === name);
  const payments = name === 'ALL' ? A.payments : A.payments.filter(p => p.client === name);
  const renewals = policies.filter(p => p.status === 'RENEWAL' || p.status === 'IN_RENEWAL');
  const activePolicies = policies.filter(p => p.status === 'ACTIVE');
  const latestPayment = payments[0]?.amount || '—';
  return { policies, claims, payments, renewals, activePolicies, latestPayment };
}

function parseMoney(value) {
  return Number(String(value || '').replace(/[^\d]/g, '')) || 0;
}

function formatCompactAmount(value) {
  if (value >= 1000000) {
    const millions = value / 1000000;
    return `${Number.isInteger(millions) ? millions : millions.toFixed(1).replace(/\.0$/, '')}M`;
  }
  if (value >= 1000) return `${Math.round(value / 1000)}K`;
  return `${value}`;
}

function getPrimaryPolicy(snapshot) {
  return snapshot.activePolicies[0] || snapshot.renewals[0] || snapshot.policies[0] || null;
}

function getSelectedClientPolicy(snapshot) {
  if (!snapshot.policies.length) return null;
  const selected = snapshot.policies.find(p => p.id === activeClientPolicyId);
  return selected || snapshot.policies[0];
}

function getWorkspaceItems(k) {
  const snapshot = getClientSnapshot(activeClient);
  if (k === 'pol') return snapshot.policies;
  const selected = getSelectedClientPolicy(snapshot);
  if (!selected) return [];
  const source = k === 'cl' ? snapshot.claims : snapshot.payments;
  return source.filter(item => item.policy === selected.id);
}

function getClientPolicyItems() {
  return getClientSnapshot(activeClient).policies;
}

function getClientBenefitModel(snapshot, primaryPolicy) {
  if (!primaryPolicy || !/Medical/i.test(primaryPolicy.product)) {
    return { benefits: [], usage: [] };
  }

  const usage = [
    { benefit:'OPD', provider:'International Hospital Kampala', amount:'UGX 55,000', date:snapshot.claims[0]?.filed || '10 Apr 2026' },
    { benefit:'Dental', provider:'Dental Care Centre', amount:'UGX 120,000', date:snapshot.claims[1]?.filed || '15 Mar 2026' }
  ];
  const usageMap = { 'OPD COVER': 55000, 'DENTAL': 120000 };
  const expires = '28 Apr 2027';
  const benefits = [
    { name:'OPD COVER', total:800000, status:'ACTIVE', expires },
    { name:'IPD COVER', total:5000000, status:'ACTIVE', expires },
    { name:'PHARMACY COVER', total:600000, status:'ACTIVE', expires },
    { name:'DENTAL', total:250000, status:'ACTIVE', expires }
  ].map(item => {
    const used = usageMap[item.name] || 0;
    const remaining = Math.max(item.total - used, 0);
    const fill = item.total > 0 ? Math.min((used / item.total) * 100, 100) : 0;
    return {
      ...item,
      fill,
      remainingLabel: formatCompactAmount(remaining),
      totalLabel: formatCompactAmount(item.total)
    };
  });

  return { benefits, usage };
}

function openIpfFlow(id) {
  const policy = A.policies.find(x => x.id === id);
  if (!policy) return;
  const state = getPolicyIpfState(id);

  if (state.status === 'ACTIVE' || state.status === 'PENDING') {
    setModalContent(`${policy.product} - IPF Details`, `
      <div class="mcopy">${state.note || 'Instalment details are available for this policy.'}</div>
      <div class="msect">Plan Summary</div>
      <div class="mgrid">
        ${mf('Status', state.status === 'ACTIVE' ? bdg('ACTIVE') : bdg('Pending'))}
        ${mf('Plan', state.plan || 'Requested plan')}
        ${mf('Deposit', state.deposit || 'To be confirmed')}
        ${mf('Financed Amount', state.financed || 'To be confirmed')}
        ${mf('Next Due', state.nextDue || 'Awaiting approval')}
        ${mf('Instalment Amount', state.monthly || 'Awaiting approval')}
      </div>
      <div class="msect">Plan Timeline</div>
      ${renderModalList((state.schedule || []).map(text => ['Plan step', text]))}
    `);
    return;
  }

  ipfDraft = {
    id,
    instalments: state.suggestedInstalments || 3,
    depositPct: state.suggestedDepositPct || 30
  };
  renderIpfStepOne();
}

function renderIpfStepOne() {
  if (!ipfDraft) return;
  const policy = A.policies.find(x => x.id === ipfDraft.id);
  if (!policy) return;
  const premium = parseMoney(policy.premium);
  const deposit = Math.round((premium * ipfDraft.depositPct) / 100);
  const financed = Math.max(premium - deposit, 0);
  const instalmentAmount = ipfDraft.instalments ? Math.round(financed / ipfDraft.instalments) : financed;

  setModalContent(`${policy.product} - Apply for IPF`, `
    <div class="mcopy">Split this premium into a deposit and manageable follow-up payments.</div>
    <div class="msect">Choose A Plan</div>
    <div class="mtag-row">
      ${[2,3,4].map(count => `<button class="mtag ${ipfDraft.instalments === count ? 'is-active' : ''}" onclick="setIpfInstalments(${count})">${count} instalments</button>`).join('')}
    </div>
    <div class="mgrid">
      ${mf('Policy Premium', policy.premium)}
      ${mf('Deposit Today', formatUGX(deposit))}
      ${mf('Financed Amount', formatUGX(financed))}
      ${mf('Per Instalment', formatUGX(instalmentAmount))}
      ${mf('First Due Date', policy.due)}
      ${mf('Applied By', A.name)}
    </div>
    <div class="widget-action-end" style="margin-top:16px">
      <button class="btn-red" onclick="renderIpfStepTwo()">Continue</button>
    </div>
  `);
}

function setIpfInstalments(count) {
  if (!ipfDraft) return;
  ipfDraft.instalments = count;
  renderIpfStepOne();
}

function renderIpfStepTwo() {
  if (!ipfDraft) return;
  const policy = A.policies.find(x => x.id === ipfDraft.id);
  if (!policy) return;
  const premium = parseMoney(policy.premium);
  const deposit = Math.round((premium * ipfDraft.depositPct) / 100);
  const financed = Math.max(premium - deposit, 0);
  const instalmentAmount = ipfDraft.instalments ? Math.round(financed / ipfDraft.instalments) : financed;

  setModalContent(`${policy.product} - Review IPF Request`, `
    <div class="mcopy">Review the plan below, then submit the request for finance approval.</div>
    <div class="msect">Request Summary</div>
    <div class="mgrid">
      ${mf('Policy ID', policy.id)}
      ${mf('Product', policy.product)}
      ${mf('Instalment Plan', `${ipfDraft.instalments} instalments`)}
      ${mf('Deposit', formatUGX(deposit))}
      ${mf('Financed Amount', formatUGX(financed))}
      ${mf('Per Instalment', formatUGX(instalmentAmount))}

function submitIpfRequest() {
  if (!ipfDraft) return;
  const policy = A.policies.find(x => x.id === ipfDraft.id);
  if (!policy) return;
  const premium = parseMoney(policy.premium);
  const deposit = Math.round((premium * ipfDraft.depositPct) / 100);
  const financed = Math.max(premium - deposit, 0);
  const instalmentAmount = ipfDraft.instalments ? Math.round(financed / ipfDraft.instalments) : financed;

  ipfState[ipfDraft.id] = {
    status:"PENDING",
    plan:`${ipfDraft.instalments}-part instalment plan`,
    deposit:formatUGX(deposit),
    financed:formatUGX(financed),
    nextDue:policy.due,
    monthly:formatUGX(instalmentAmount),
    note:"Instalment request sent. Finance review is now pending.",
    schedule:[
      `Request submitted on ${new Date().toLocaleDateString('en-GB')}`,
      `Deposit to be collected after approval: ${formatUGX(deposit)}`,
      `Follow-up instalments planned at ${formatUGX(instalmentAmount)} each`
    ]
  };

  renderAgentWorkspaceV2();
  setModalContent(`${policy.product} - IPF Request Sent`, `
    <div class="mcopy">The instalment request has been logged for this policy. You can track it from the Payments & IPF card.</div>
    <div class="mgrid">
      ${mf('Policy', policy.id)}
      ${mf('Requested Plan', ipfState[ipfDraft.id].plan)}
      ${mf('Deposit', ipfState[ipfDraft.id].deposit)}
      ${mf('Status', bdg('Pending'))}
    </div>
  `);
  ipfDraft = null;
}

function setActiveClient(name) {
  activeClient = name;
  pg.cpol = 0;
  pg.pol = 0;
  pg.cl = 0;
  pg.pm = 0;
  const snapshot = getClientSnapshot(activeClient);
  activeClientPolicyId = snapshot.policies[0]?.id || null;

}

function selectAgentPolicy(policyId) {
  activeClientPolicyId = policyId;
  pg.cl = 0;
  pg.pm = 0;
  renderAgentWorkspaceV2();
}

const PS = { pol:7, cpol:4, cl:4, pm:4, sch:3, ef:3 };
const pg = { pol:0, cpol:0, cl:0, pm:0, sch:0, ef:0 };
function pgd(arr, k) {
  const sz=PS[k], p=pg[k], n=arr.length, s=p*sz, e=Math.min(s+sz,n);
  return { items:arr.slice(s,e), s:s+1, e, n, prev:p>0, next:e<n };
}
function cpg(k, d) {
  const arr = k === 'sch' ? A.schedules : k === 'ef' ? A.efris : k === 'cpol' ? getClientPolicyItems() : getWorkspaceItems(k);
  pg[k] = Math.max(0, Math.min(pg[k]+d, Math.ceil(arr.length/PS[k])-1));
  renderAgentWorkspaceV2();
}
function pgHTML(k, r) {
  return `<div class="pgrow">
    <span class="pgtext">Showing <strong>${r.s}–${r.e}</strong> of <strong>${r.n}</strong></span>
    <div class="pgarr">
      <button class="pgbtn" onclick="cpg('${k}',-1)" ${!r.prev?'disabled':''}>&lsaquo;</button>
      <button class="pgbtn" onclick="cpg('${k}',1)"  ${!r.next?'disabled':''}>&rsaquo;</button>
    </div>
  </div>`;
}

function bdg(s) {
  const m={ 'ACTIVE':'b-active','RENEWAL':'b-renewal','IN_RENEWAL':'b-renewal','EXPIRED':'b-expired',
    'Paid':'b-paid','Pending':'b-pending','Settled':'b-settled','Under Review':'b-review',
    'Successful':'b-success','Pending Finance Review':'b-pr','Processed':'b-ok','Rejected':'b-no' };
  const l={ 'ACTIVE':'ACTIVE','RENEWAL':'IN RENEWAL','IN_RENEWAL':'IN RENEWAL','EXPIRED':'EXPIRED','Pending Finance Review':'PENDING REVIEW' };
  return `<span class="badge ${m[s]||'b-pending'}">${l[s]||s.toUpperCase()}</span>`;
}
function mf(lbl, val) {
  return `<div class="mfield"><span class="mlbl">${lbl}</span><span class="mval">${val}</span></div>`;
}
function mfFull(lbl, val) {
  return `<div class="mfield full"><span class="mlbl">${lbl}</span><span class="mval">${val}</span></div>`;
}

              <div class="client-policy-bottom">
                <span class="client-policy-tag freq">${policy.tag || policy.product}</span>
                <span class="client-policy-tag due">Due on: ${policy.due}</span>
                <button class="client-policy-refresh" onclick="event.stopPropagation()" aria-label="Refresh policy">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <polyline points="1 20 1 14 7 14"></polyline>
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                  </svg>
                </button>
              </div>
            </div>`).join('') : `<div class="no-data">No policies found for this client.</div>`}
        </div>
        ${snapshot.policies.length ? `
          <div class="client-policy-footer">
            <div class="txn-pagination">
              <div class="pager-inline-text">Showing <strong>${policyPage.s}-${policyPage.e}</strong> of <strong>${policyPage.n}</strong></div>
              <div class="pager-inline-arrows">
                <button class="pg-nav" ${!policyPage.prev ? 'disabled' : ''} onclick="cpg('cpol',-1)">
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                </button>
                <button class="pg-nav" ${!policyPage.next ? 'disabled' : ''} onclick="cpg('cpol',1)">
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                </button>
              </div>
            </div>
          </div>` : ''}
      </aside>
      <div class="client-main">
        <div class="client-widget-cols">
          <div class="client-widget-col">
            <div class="wcard">
              <div class="whead">
                <div class="wttl"><div class="wbar"></div><span class="wtitle">Policy Details</span></div>
                ${selectedPolicy ? bdg(selectedPolicy.status) : ''}
              </div>
              <div class="wbody">
                ${selectedPolicy ? `
                  <div class="widget-stack">
                    <p class="widget-kicker">${model ? model.overview.map(item => item[1]).slice(0, 3).join(' / ') : 'Policy summary available for this cover.'}</p>
                    ${renderSummaryList([
                      ['Policy holder', selectedPolicy.client],
                      ['Product', selectedPolicy.product],
                      ['Annual premium', selectedPolicy.premium],
                      ['Sum covered', selectedPolicy.sumCovered],
                      ['Renewal date', selectedPolicy.due]
                    ])}
                  </div>
                  <div class="widget-action-end" style="gap:10px;flex-wrap:wrap">
                    <button class="btn-outline-soft" onclick="openProductWidgetModal('documents','${selectedPolicy.id}')">Open Policy Pack</button>
                    <button class="btn-red" onclick="openPolicyModal('${selectedPolicy.id}')">View Policy</button>
                  </div>
                ` : `<div class="no-data">No policy details available for this client.</div>`}
              </div>
            </div>

            <div class="wcard">
              <div class="whead">
                <div class="wttl"><div class="wbar"></div><span class="wtitle">Document Centre</span></div>
                <span class="wcount">${selectedPolicy ? docMeta.count : 0} docs</span>
              </div>
              <div class="wbody">
                ${selectedPolicy && model ? `
                  <div class="widget-stack">
                    <p class="widget-kicker">${model.documents.copy}</p>
                    ${renderChipRow(model.documents.items.slice(0, 3))}
                  </div>
                  <div class="widget-action-end">
                    <button class="btn-red" onclick="openProductWidgetModal('documents','${selectedPolicy.id}')">Open Documents</button>
                  </div>
                ` : `<div class="no-data">Select a policy to view documents.</div>`}
              </div>
            </div>

            <div class="wcard">
              <div class="whead">
                <div class="wttl"><div class="wbar"></div><span class="wtitle">${selectedPolicy && model ? model.asset.title : 'Policy Register'}</span></div>
                <span class="wcount">${selectedPolicy ? selectedPolicy.tag || 'Policy' : 'Details'}</span>
              </div>
              <div class="wbody">
                ${selectedPolicy && model ? `
                  <div class="widget-stack">
                    <p class="widget-kicker">This keeps the main insured item and its key policy note in view.</p>
                    ${renderSummaryList(model.asset.summary)}
                  </div>
                  <div class="widget-action-end">
                    <button class="btn-red" onclick="openProductWidgetModal('asset','${selectedPolicy.id}')">View Details</button>
                  </div>
                ` : `<div class="no-data">Select a policy to view its schedule details.</div>`}
              </div>
            </div>
          </div>

          <div class="client-widget-col">
            <div class="wcard">
              <div class="whead">
                <div class="wttl"><div class="wbar"></div><span class="wtitle">${selectedPolicy && model ? model.coverage.title : 'Coverage Snapshot'}</span></div>
                <span class="wcount">${selectedPolicy ? 'Core cover' : '-'}</span>
              </div>
              <div class="wbody">
                ${selectedPolicy && model ? `
                  <div class="widget-stack">
                    <p class="widget-kicker">The most important limits, extensions, and active sections for this policy are surfaced here.</p>
                    ${renderSummaryList(model.coverage.summary)}
                    ${renderChipRow(model.coverage.sections)}
                  </div>
                  <div class="widget-action-end">
                    <button class="btn-red" onclick="openProductWidgetModal('coverage','${selectedPolicy.id}')">View Cover</button>
                  </div>
                ` : `<div class="no-data">Select a policy to view its cover summary.</div>`}
              </div>
            </div>

            <div class="wcard">
              <div class="whead">
                <div class="wttl"><div class="wbar"></div><span class="wtitle">Claims Summary</span></div>
                <span class="wcount">${policyClaims.length} claim${policyClaims.length === 1 ? '' : 's'}</span>
              </div>
              <div class="wbody">
                ${selectedPolicy && model ? `
                  <div class="widget-stack">
                    <p class="widget-kicker">${latestClaim ? `Latest claim: ${latestClaim.id} - ${latestClaim.status}` : 'No active claim yet. The claim checklist is ready when one is reported.'}</p>
                    ${renderSummaryList(model.claims.summary)}
                    ${recentClaims.length ? `
                      <div class="txn-list">
                        ${recentClaims.map(claim => `
                          <div class="txn-card" onclick="openClaimModal('${claim.id}')">
                            <div class="txn-left">
                              <div class="txn-date">${claim.id}</div>
                              <div class="txn-meta">${claim.filed}</div>
                            </div>
                            <div class="txn-right">
                              <div class="txn-amt">${claim.amount}</div>
                              ${bdg(claim.status)}
                            </div>
                          </div>
                        `).join('')}
                      </div>
                    ` : renderChipRow(model.claims.checklist.slice(0, 3))}
                  </div>
                  <div class="widget-action-end">
                    <button class="btn-red" onclick="openProductWidgetModal('claims','${selectedPolicy.id}')">Open Claim Support</button>
                  </div>
                ` : `<div class="no-data">Select a policy to view claim guidance and evidence needs.</div>`}
              </div>
            </div>

            <div class="wcard">
              <div class="whead">
                <div class="wttl"><div class="wbar"></div><span class="wtitle">Renewal & Tasks</span></div>
                ${selectedPolicy ? bdg(selectedPolicy.status) : ''}
              </div>
              <div class="wbody">
                ${selectedPolicy && model ? `
                  <div class="widget-stack">
                    <p class="widget-kicker">This keeps the next renewal driver and the follow-up work in one place.</p>
                    ${renderSummaryList(model.renewal.summary)}
                    ${renderChipRow(model.renewal.tasks.slice(0, 3))}
                  </div>
                  <div class="widget-action-end">
                    <button class="btn-red" onclick="openProductWidgetModal('renewal','${selectedPolicy.id}')">Review Renewal</button>
                  </div>
                ` : `<div class="no-data">Select a policy to review renewal and action items.</div>`}
              </div>
            </div>
          </div>

          <div class="client-widget-col">
            <div class="wcard">
              <div class="whead">
                <div class="wttl"><div class="wbar"></div><span class="wtitle">Payments & IPF</span></div>
                <span class="wcount">${ipf ? (ipf.status === 'ACTIVE' ? 'IPF active' : ipf.status === 'PENDING' ? 'Request pending' : 'No IPF') : 'Payments'}</span>
              </div>
              <div class="wbody">
                ${selectedPolicy && model && ipf ? `
                  <div class="widget-stack">
                    <p class="widget-kicker">${ipf.status === 'ACTIVE' ? ipf.note : ipf.status === 'PENDING' ? ipf.note : 'No active instalment plan yet. Apply only if this client needs to spread the premium.'}</p>
                    ${renderSummaryList(
                      ipf.status === 'ACTIVE' || ipf.status === 'PENDING'
                        ? [
                            ['Annual premium', selectedPolicy.premium],
                            ['Plan', ipf.plan],
                            ['Deposit', ipf.deposit],
                            ['Next due', ipf.nextDue],
                            ['Instalment amount', ipf.monthly],
                            ['Status', ipf.status === 'ACTIVE' ? 'Active' : 'Pending approval']
                          ]
                        : [
                            ['Annual premium', selectedPolicy.premium],
                            ['Amount paid', model.payments.summary[1][1]],
                            ['Outstanding', model.payments.summary[2][1]],
                            ['IPF status', 'Not active'],
                            ['Suggested plan', `${ipf.suggestedInstalments} instalments`],
                            ['Suggested deposit', `${ipf.suggestedDepositPct}% upfront`]
                          ]
                    )}
                    ${renderChipRow((ipf.schedule || model.payments.schedule).slice(0, 3))}
                  </div>
                  <div class="widget-action-end" style="gap:10px;flex-wrap:wrap">
                    <button class="btn-outline-soft" onclick="openProductWidgetModal('payments','${selectedPolicy.id}')">View Payments</button>
                    <button class="btn-red" onclick="openIpfFlow('${selectedPolicy.id}')">${ipf.status === 'ACTIVE' ? 'Manage IPF' : ipf.status === 'PENDING' ? 'View Request' : 'Apply for IPF'}</button>
                  </div>
                ` : `<div class="no-data">Select a policy to view premium and instalment details.</div>`}
              </div>
            </div>

            <div class="wcard">
              <div class="whead">
                <div class="wttl"><div class="wbar"></div><span class="wtitle">Transaction History</span></div>
                <span class="wcount">${policyPayments.length} record${policyPayments.length === 1 ? '' : 's'}</span>
              </div>
              <div class="wbody">
                ${selectedPolicy ? (
                  recentPayments.length ? `
                    <div class="txn-list">
                      ${recentPayments.map(payment => `
                        <div class="txn-card" onclick="openPaymentModal(${A.payments.indexOf(payment)})">
                          <div class="txn-left">
                            <div class="txn-date">${payment.date}</div>
                            <div class="txn-meta">${payment.method}</div>
                            <div class="txn-id-row">${payment.policy}</div>
                          </div>
                          <div class="txn-right">
                            <div class="txn-amt">${payment.amount}</div>
                            ${bdg(payment.status)}
                          </div>
                        </div>
                      `).join('')}
                    </div>
                  ` : `<div class="no-data">No payments have been logged for this policy yet.</div>`
                ) : `<div class="no-data">Select a policy to view transaction history.</div>`}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>`;
}

function submitEf() {
  if (!document.getElementById('efNum').value.trim()   ||
      !document.getElementById('efAmt').value.trim()   ||
      !document.getElementById('efPeriod').value       ||
      !document.getElementById('efDate').value) {
    alert('Please complete all fields.'); return;
  }
  if (!document.getElementById('efFile').files[0]) {
    alert('Please attach your eFRIS invoice PDF.'); return;
  }
  const n = document.getElementById('efNotif');
  n.classList.add('show');
  n.scrollIntoView({ behavior:'smooth', block:'nearest' });
}
function resetEf() {
  ['efNum','efAmt','efPeriod','efDate'].forEach(id => { const e=document.getElementById(id); if(e) e.value=''; });
  const fi=document.getElementById('efFile'); if(fi) fi.value='';
  const fn=document.getElementById('efFileName'); if(fn){ fn.textContent='No file selected'; fn.style.color='var(--muted)'; }
  const nb=document.getElementById('efNotif'); if(nb) nb.classList.remove('show');
}
function downloadSchedule() {
  alert('Downloading: Commission_Schedule_' + A.code + '_Apr2026.pdf');
}

(function () {
  const drawer = document.getElementById('site-ai-drawer');
  const messages = document.getElementById('site-ai-messages');
  const input = document.getElementById('site-ai-input');
  const openIcon = document.getElementById('site-ai-open-icon');
  const closeIcon = document.getElementById('site-ai-close-icon');
  if (!drawer || !messages || !input || !openIcon || !closeIcon) return;

  let inited = false;
  let busy = false;
  const botSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12a8 8 0 0 1 16 0"/><path d="M3 13v3a2 2 0 0 0 2 2h2v-7H5a2 2 0 0 0-2 2Z"/><path d="M21 13v3a2 2 0 0 1-2 2h-2v-7h2a2 2 0 0 1 2 2Z"/><path d="M9 18a3 3 0 0 0 3 3h2"/></svg>';
  const userSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>';

  function esc(text) {
    return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  function fmtTime() {
    return new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  }
  function setOpenState(open) {
    drawer.classList.toggle('site-ai-hidden', !open);
    openIcon.classList.toggle('site-ai-hidden', open);
    closeIcon.classList.toggle('site-ai-hidden', !open);
  }
  function addMessage(kind, text) {
    const row = document.createElement('div');
    row.className = `site-ai-msg ${kind}`;
    row.innerHTML = `
      <div class="site-ai-msg-icon">${kind === 'bot' ? botSvg : userSvg}</div>
      <div class="site-ai-bubble">
        <div style="white-space:pre-line">${esc(text)}</div>
        <div class="site-ai-time">${fmtTime()}</div>
      </div>`;
    messages.appendChild(row);
    messages.scrollTop = messages.scrollHeight;
  }
  function showTyping() {
    const row = document.createElement('div');
    row.id = 'site-ai-typing';
    row.className = 'site-ai-msg bot';
    row.innerHTML = `
      <div class="site-ai-msg-icon">${botSvg}</div>
      <div class="site-ai-bubble">
        <div class="site-ai-typing"><span></span><span></span><span></span></div>
      </div>`;
    messages.appendChild(row);
    messages.scrollTop = messages.scrollHeight;
  }
  function hideTyping() {
    const row = document.getElementById('site-ai-typing');
    if (row) row.remove();
  }
  function getReply(text) {
    const t = text.toLowerCase();
    if (t.match(/commission|payment/)) return "I can help you check commissions, payment records, or what is still pending.";
    if (t.match(/claim|claims/)) return "I can help you review claim activity, claim status, or what needs follow-up next.";
    if (t.match(/client|policy/)) return "I can help you find policy details, client records, and renewal information.";
    if (t.match(/renew/)) return "I can help you review renewals and what needs action next.";
    if (t.match(/hello|hi|hey/)) return "Hello. How can I help you today?";
    return "I can help with clients, policies, claims, commissions, and renewals. What would you like to check?";
  }

  window.siteAiToggle = function () {
    const isHidden = drawer.classList.contains('site-ai-hidden');
    if (isHidden) window.siteAiOpenChat();
    else window.siteAiCloseChat();
  };
  window.siteAiOpenChat = function () {
    setOpenState(true);
    if (!inited) {
      inited = true;
      addMessage('bot', "Hello. Welcome to Britam support. How can we help you today?");
    }
    setTimeout(() => input.focus(), 80);
  };
  window.siteAiCloseChat = function () {
    setOpenState(false);
  };
  window.siteAiSend = function () {
    const text = input.value.trim();
    if (!text || busy) return;
    input.value = '';
    addMessage('user', text);
    busy = true;
    showTyping();
    setTimeout(() => {
      hideTyping();
      addMessage('bot', getReply(text));
      busy = false;
    }, 700);
  };

  input.addEventListener('keydown', function (event) {
    if (event.key === 'Enter' && !event.shiftKey) {
      event.preventDefault();
      window.siteAiSend();
    }
  });
})();

document.addEventListener('DOMContentLoaded', renderAgentWorkspaceV2);
</script>
